name: Fuzz

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Per-target fuzz time (e.g. 5m, 30m, 2h)"
        default: "5m"
        required: true
  schedule:
    # Weekly long-running fuzz on Monday at 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  fuzz:
    name: FuzzClientIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Fuzz clientIP
        run: go test -run='^$' -fuzz=FuzzClientIP -fuzztime=${{ github.event.inputs.duration || '15m' }} ./...

      - name: Upload corpus on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus
          path: testdata/fuzz/
